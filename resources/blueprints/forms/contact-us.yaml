tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: name
            field:
              type: text
              display: Name
              validate:
                - required
          -
            handle: email
            field:
              input_type: email
              type: text
              display: Email
              validate:
                - required
          -
            handle: phone_number
            field:
              input_type: tel
              type: text
              display: 'Phone Number'
              validate:
                - required
          -
            handle: help_topic
            field:
              options:
                -
                  key: leadership-coaching
                  value: 'Leadership Coaching'
                -
                  key: sales-and-business-development
                  value: 'Sales and Business Development'
                -
                  key: operational-improvement
                  value: 'Operational Improvement'
                -
                  key: marketing-and-brand-strategy
                  value: 'Marketing and Brand Strategy'
                -
                  key: financial-management
                  value: 'Financial Management'
                -
                  key: business-strategy-development
                  value: 'Business Strategy Development'
                -
                  key: other
                  value: Other
              type: select
              display: 'Help Topic'
              default: How_we_can_help_you
              validate:
                - required
          -
            handle: message
            field:
              type: textarea
              display: Message
              validate:
                - required
