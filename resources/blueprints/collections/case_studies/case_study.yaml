title: 'Case Study'
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: author
            field:
              max_items: 1
              mode: select
              collections:
                - our_consultant
              type: entries
              display: Author
      -
        display: 'Page Builder'
        fields:
          -
            import: page_builder
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
          -
            handle: categories
            field:
              max_items: 1
              mode: select
              taxonomies:
                - categories
              type: terms
              display: Categories
              validate:
                - required
          -
            handle: date
            field:
              type: date
              required: true
              default: now
              validate:
                - required
